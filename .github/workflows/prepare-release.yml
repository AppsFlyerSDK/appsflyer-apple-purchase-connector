name: "Prepare Release"

on:
  push:
    branches: ['releases/**']

jobs:
  prepare:
    if: startsWith(github.ref, 'refs/heads/releases/')
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Validate .release-variables is updated
        run: |
          set -e

          git fetch origin main --quiet

          if ! git diff origin/main -- .release-variables | grep -q .; then
            echo "ERROR: .release-variables has not been updated since main." >&2
            echo "" >&2
            echo "Before pushing a release branch, update both values in .release-variables:" >&2
            echo "  purchase_connector_version=X.Y.Z" >&2
            echo "  appsflyer_framework_version=X.Y.Z" >&2
            exit 1
          fi

          echo "✅ .release-variables has been updated"

      - name: Read versions from .release-variables
        id: read_versions
        run: |
          set -e

          if [ ! -f .release-variables ]; then
            echo "ERROR: .release-variables file not found in repo root." >&2
            exit 1
          fi

          PC_VERSION=$(grep '^purchase_connector_version=' .release-variables | cut -d'=' -f2 | tr -d '[:space:]')
          AF_VERSION=$(grep '^appsflyer_framework_version=' .release-variables | cut -d'=' -f2 | tr -d '[:space:]')

          if ! [[ "$PC_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid purchase_connector_version format: '$PC_VERSION'" >&2
            echo "Expected format: X.Y.Z (e.g., 6.18.1)" >&2
            exit 1
          fi

          if ! [[ "$AF_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid appsflyer_framework_version format: '$AF_VERSION'" >&2
            echo "Expected format: X.Y.Z (e.g., 6.18.0)" >&2
            exit 1
          fi

          echo "pc_version=$PC_VERSION" >> $GITHUB_OUTPUT
          echo "af_version=$AF_VERSION" >> $GITHUB_OUTPUT
          echo "PurchaseConnector version: $PC_VERSION"
          echo "AppsFlyerFramework version: $AF_VERSION"

      - name: Validate XCFrameworks present
        run: |
          set -e

          if [ ! -d PurchaseConnector.xcframework ] || [ ! -d Dynamic/PurchaseConnector.xcframework ]; then
            echo "ERROR: Missing XCFrameworks" >&2
            echo "  - PurchaseConnector.xcframework: $([ -d PurchaseConnector.xcframework ] && echo '✅' || echo '❌')" >&2
            echo "  - Dynamic/PurchaseConnector.xcframework: $([ -d Dynamic/PurchaseConnector.xcframework ] && echo '✅' || echo '❌')" >&2
            exit 1
          fi

          echo "✅ XCFrameworks validated"

      - name: Update all version files
        env:
          PC_VERSION: ${{ steps.read_versions.outputs.pc_version }}
          AF_VERSION: ${{ steps.read_versions.outputs.af_version }}
        run: |
          set -e

          echo "Updating version files..."
          echo "  PurchaseConnector: $PC_VERSION"
          echo "  AppsFlyerFramework: $AF_VERSION"

          ./scripts/update_carthage.sh "$PC_VERSION"
          ./scripts/update_podspec.sh "$PC_VERSION" "$AF_VERSION"
          ./scripts/update_spm.sh "$AF_VERSION"
          ./scripts/update_readme.sh "$PC_VERSION" "$AF_VERSION"

          echo "✅ All files updated"

      - name: Commit changes to releases branch
        env:
          PC_VERSION: ${{ steps.read_versions.outputs.pc_version }}
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: bump version to $PC_VERSION"
          git push origin "$BRANCH_NAME"
          echo "✅ Changes committed and pushed to $BRANCH_NAME"

      - name: Create tag
        env:
          PC_VERSION: ${{ steps.read_versions.outputs.pc_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git tag "$PC_VERSION" -m "Release $PC_VERSION"
          git push origin "$PC_VERSION"
          echo "✅ Tag $PC_VERSION created and pushed"

      - name: Create PR to main
        env:
          PC_VERSION: ${{ steps.read_versions.outputs.pc_version }}
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TARGET_BRANCH="main"
          PR_TITLE="chore: release $PC_VERSION"
          PR_BODY="Release version $PC_VERSION"
          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body "$PR_BODY"
          echo "✅ PR created from $BRANCH_NAME to $TARGET_BRANCH"

      - name: Summary
        env:
          PC_VERSION: ${{ steps.read_versions.outputs.pc_version }}
          AF_VERSION: ${{ steps.read_versions.outputs.af_version }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "## Release Preparation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PurchaseConnector version**: $PC_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**AppsFlyerFramework version**: $AF_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: $BRANCH_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Target**: main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ready for manual approval and merge" >> $GITHUB_STEP_SUMMARY
